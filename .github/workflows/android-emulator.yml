name: Remote Android Emulator

on:
  workflow_dispatch: # Cho phép nhấn nút "Run workflow" thủ công từ giao diện GitHub

jobs:
  run-emulator:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Enable KVM (Hardware Acceleration)
      run: |
        # Kiểm tra và cấp quyền cho KVM để Emulator chạy mượt, không bị lag cực hạn
        sudo apt-get update
        sudo apt-get install -y qemu-kvm libvirt-daemon-system libvirt-clients bridge-utils
        sudo adduser $USER kvm
        sudo chown root:kvm /dev/kvm
        ls -l /dev/kvm

    - name: Install Cloudflare Tunnel (cloudflared)
      run: |
        curl -L --output cloudflared.deb https://github.com/cloudflare/cloudflared/releases/latest/download/cloudflared-linux-amd64.deb
        sudo dpkg -i cloudflared.deb

    - name: Start Android Emulator Container
      run: |
        # Sử dụng image docker-android có sẵn giao diện Web qua cổng 6080 (noVNC)
        # Chọn phiên bản Android 11 (API 30) để cân bằng giữa hiệu năng và tính năng
        docker run -d -p 6080:6080 --name android-container \
          --device /dev/kvm \
          -e EMULATOR_DEVICE="Nexus 5" \
          -e WEB_HUD=true \
          -e VNC_PASSWORD=secret \
          budtmo/docker-android:emulator_11.0

        echo "Đang khởi động Emulator, vui lòng đợi trong giây lát..."
        sleep 30 # Đợi container thiết lập ban đầu

    - name: Expose via Cloudflare Tunnel
      run: |
        echo "=========================================================="
        echo " TRUY CẬP ĐƯỜNG DẪN TRYCLOUDFLARE DƯỚI ĐÂY ĐỂ ĐIỀU KHIỂN "
        echo "=========================================================="
        
        # Chạy cloudflared tunnel trỏ vào cổng 6080 (giao diện web của emulator)
        # Dùng lệnh tail để giữ workflow không bị dừng lại cho đến khi hết timeout của GA (6 tiếng)
        cloudflared tunnel --url http://localhost:6080 2>&1 | tee cloudflare.log &
        
        # Đợi 5 giây để tunnel khởi tạo và lấy public URL từ log
        sleep 5
        grep -oE "https://[a-zA-Z0-9.-]+\.trycloudflare\.com" cloudflare.log || true
        
        # Giữ session chạy liên tục
        tail -f /dev/null
