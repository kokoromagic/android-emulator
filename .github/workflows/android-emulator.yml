name: Remote Android All-In-One

on:
  workflow_dispatch:

jobs:
  run-emulator:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Enable KVM & Install Cloudflared
      run: |
        sudo apt-get update
        sudo apt-get install -y qemu-kvm libvirt-daemon-system libvirt-clients bridge-utils netcat-openbsd
        
        # Cấp quyền tối đa cho KVM phần cứng trên Runner
        sudo chmod 666 /dev/kvm
        sudo usermod -aG kvm $USER
        sudo systemctl restart docker
        
        # Cài đặt cloudflared
        curl -L --output cloudflared.deb https://github.com/cloudflare/cloudflared/releases/latest/download/cloudflared-linux-amd64.deb
        sudo dpkg -i cloudflared.deb

    - name: Start Dockerify Android (Emulator + Scrcpy Web)
      run: |
        # Chạy single-container tích hợp sẵn Emulator và Web Streamer trên cổng 8000
        sudo docker run -d --privileged \
          --name android-all-in-one \
          --device /dev/kvm \
          -p 8000:8000 \
          -p 5555:5555 \
          -e RAM_SIZE=4096 \
          -e SCREEN_RESOLUTION=720x1280 \
          -e SCREEN_DENSITY=320 \
          shmayro/dockerify-android:latest

    - name: Wait for Web Service to Be Ready
      run: |
        echo "--------------------------------------------------------"
        echo " Đang chờ giao diện Web Scrcpy (Cổng 8000) kích hoạt..."
        echo "--------------------------------------------------------"
        
        # Chờ cho đến khi web service phản hồi kết nối
        until nc -z 127.0.0.1 8000; do
          echo "Dịch vụ Web đang khởi tạo..."
          sleep 5
        done
        echo "Cổng 8000 đã hoạt động ổn định!"

    - name: Expose via Cloudflare Tunnel
      run: |
        touch cloudflare.log
        # Trỏ Tunnel trực tiếp vào cổng 8000 của container tổng hợp
        sudo cloudflared tunnel --url http://127.0.0.1:8000 > cloudflare.log 2>&1 &
        
        echo "--------------------------------------------------------"
        echo " Đang cào link public từ Cloudflare..."
        echo "--------------------------------------------------------"
        
        for i in {1..10}; do
          TUNNEL_URL=$(grep -oE "https://[a-zA-Z0-9.-]+\.trycloudflare\.com" cloudflare.log | head -n 1)
          if [ ! -z "$TUNNEL_URL" ]; then
            echo ""
            echo "=========================================================="
            echo " LINK ĐIỀU KHIỂN ANDROID EMULATOR (SCRCPY-WEB):"
            echo " $TUNNEL_URL "
            echo "=========================================================="
            echo ""
            break
          fi
          sleep 3
        done

    - name: Monitor Android Boot Status
      run: |
        echo "--------------------------------------------------------"
        echo " Đang đợi thiết bị Android ảo hoàn tất quá trình Boot..."
        echo "--------------------------------------------------------"
        
        # Thăm dò ADB bên trong container All-In-One cho tới khi nhận trạng thái boot xong
        until sudo docker exec android-all-in-one adb shell getprop sys.boot_completed 2>/dev/null | grep -q "1"; do
          echo "Android đang tải hệ điều hành..."
          sleep 15
        done
        
        echo "=========================================================="
        echo " ANDROID ĐÃ SẴN SÀNG! Mở link Trycloudflare để trải nghiệm."
        echo "=========================================================="
        
        # Duy trì Runner hoạt động liên tục
        tail -f /dev/null
