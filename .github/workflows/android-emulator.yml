name: Remote Android Redroid

on:
  workflow_dispatch:

jobs:
  run-emulator:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Install Kernel Modules & Cloudflared
      run: |
        sudo apt-get update
        sudo apt-get install -y linux-modules-extra-$(uname -r) netcat-openbsd
        
        # Cài đặt cloudflared
        curl -L --output cloudflared.deb https://github.com/cloudflare/cloudflared/releases/latest/download/cloudflared-linux-amd64.deb
        sudo dpkg -i cloudflared.deb

    - name: Start Redroid (Android 11 Native)
      run: |
        # Khởi động Android Container (Không dùng QEMU, chạy thẳng trên nhân Linux của host nên cực nhẹ)
        sudo docker run -d --privileged \
          --name redroid \
          -v /data:/data \
          -p 5555:5555 \
          redroid/redroid:11.0.0-latest \
          androidboot.redroid_width=720 \
          androidboot.redroid_height=1280 \
          androidboot.redroid_dpi=320

    - name: Start Scrcpy Web Streamer
      run: |
        # Chạy một container phụ chứa giao diện Web Scrcpy để stream video và nhận cảm ứng
        sudo docker run -d \
          --name scrcpy-web \
          --link redroid:android \
          -p 8000:8000 \
          -e ADB_SERVER_SOCKET=tcp:android:5555 \
          scrcpyweb/scrcpy-web:latest

    - name: Wait for Web Service to Be Ready
      run: |
        echo "Đang đợi cổng giao diện Web (8000) mở hẳn..."
        until nc -z 127.0.0.1 8000; do
          echo "Web Streamer đang khởi động..."
          sleep 3
        done
        echo "Cổng 8000 đã mở!"

    - name: Expose via Cloudflare Tunnel
      run: |
        touch cloudflare.log
        # Trỏ thẳng tunnel vào cổng 8000 (Cổng của Scrcpy Web)
        sudo cloudflared tunnel --url http://127.0.0.1:8000 > cloudflare.log 2>&1 &
        
        echo "--------------------------------------------------------"
        echo " Đang lấy link điều khiển..."
        echo "--------------------------------------------------------"
        
        for i in {1..10}; do
          TUNNEL_URL=$(grep -oE "https://[a-zA-Z0-9.-]+\.trycloudflare\.com" cloudflare.log | head -n 1)
          if [ ! -z "$TUNNEL_URL" ]; then
            echo ""
            echo "=========================================================="
            echo " LINK TRUY CẬP ANDROID (MƯỢT HƠN VNC GẤP 5 LẦN):"
            echo " $TUNNEL_URL "
            echo "=========================================================="
            echo ""
            break
          fi
          sleep 3
        done

    - name: Hold Session Running
      run: |
        echo "Hệ thống đang chạy ổn định. Bạn có thể vào link trên để điều khiển."
        sudo docker ps
        tail -f /dev/null
