name: Remote Android Emulator

on:
  workflow_dispatch:

jobs:
  run-emulator:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Enable KVM & Fix Permissions
      run: |
        sudo apt-get update
        sudo apt-get install -y qemu-kvm libvirt-daemon-system libvirt-clients bridge-utils netcat-openbsd
        
        # Cấp quyền tối đa cho KVM để tránh lỗi crash Emulator
        sudo chmod 666 /dev/kvm
        sudo usermod -aG kvm $USER
        sudo systemctl restart docker
        ls -l /dev/kvm

    - name: Install Cloudflare Tunnel (cloudflared)
      run: |
        curl -L --output cloudflared.deb https://github.com/cloudflare/cloudflared/releases/latest/download/cloudflared-linux-amd64.deb
        sudo dpkg -i cloudflared.deb

    - name: Start Android Emulator Container
      run: |
        # Thêm quyền --privileged để container can thiệp sâu vào tầng cứng, tăng tốc độ render video stream
        docker run -d -p 6080:6080 --name android-container \
          --privileged \
          --device /dev/kvm \
          -e EMULATOR_DEVICE="Nexus 5" \
          -e WEB_HUD=true \
          -e VNC_PASSWORD=secret \
          budtmo/docker-android:emulator_11.0

    - name: Wait for Port 6080 to be Ready
      run: |
        echo "=== Kiểm tra trạng thái Container ==="
        sleep 5
        docker ps
        
        echo "--------------------------------------------------------"
        echo " Đang chờ dịch vụ noVNC (Cổng 6080) mở..."
        echo "--------------------------------------------------------"
        
        # Vòng lặp check port, cổng 6080 mở thì mới cho chạy tiếp
        until nc -z 127.0.0.1 6080; do
          echo "Cổng 6080 chưa phản hồi. Đang đợi thiết lập giao diện web..."
          sleep 5
        done
        echo "Cổng 6080 đã MỞ THÀNH CÔNG!"

    - name: Expose via Cloudflare Tunnel
      run: |
        touch cloudflare.log
        # Khởi động tunnel trỏ vào cổng local đã sẵn sàng
        cloudflared tunnel --url http://127.0.0.1:6080 > cloudflare.log 2>&1 &
        
        echo "--------------------------------------------------------"
        echo " Đang lấy link Trycloudflare..."
        echo "--------------------------------------------------------"
        
        for i in {1..10}; do
          TUNNEL_URL=$(grep -oE "https://[a-zA-Z0-9.-]+\.trycloudflare\.com" cloudflare.log | head -n 1)
          if [ ! -z "$TUNNEL_URL" ]; then
            echo ""
            echo "=========================================================="
            echo " LINK TRUY CẬP ĐIỀU KHIỂN ANDROID EMULATOR CỦA BẠN:"
            echo " $TUNNEL_URL "
            echo "=========================================================="
            echo ""
            break
          fi
          sleep 3
        done

    - name: Wait for Android Boot Completed
      run: |
        echo "--------------------------------------------------------"
        echo " Đang đợi Android OS hoàn tất quá trình Boot nội bộ..."
        echo "--------------------------------------------------------"
        
        # Thăm dò hệ thống bằng adb cho đến khi nhận được trạng thái boot_completed = 1
        until docker exec android-container adb shell getprop sys.boot_completed 2>/dev/null | grep -q "1"; do
          echo "Android đang load màn hình... Vui lòng đợi..."
          sleep 15
        done
        
        echo "=========================================================="
        echo " ANDROID ĐÃ KHỞI ĐỘNG XONG! BẠN CÓ THỂ THAO TÁC CẢM ỨNG.  "
        echo "=========================================================="
        
        # Giữ phiên làm việc liên tục
        tail -f /dev/null
